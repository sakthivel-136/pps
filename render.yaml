services:
  # Backend API (FastAPI)
  - type: web
    name: pps-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  # Frontend (Next.js)
  - type: web
    name: pps-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: "npm install --include=dev && npm run build"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: "https://pps-backend.onrender.com"
